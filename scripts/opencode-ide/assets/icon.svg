<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <!-- Background gradient: deep dark blue (matches Antigravity sidebar) -->
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0b0f17"/>
      <stop offset="100%" stop-color="#131a2a"/>
    </linearGradient>
    <!-- Folder body: subtle violet/indigo gradient -->
    <linearGradient id="folder" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <!-- Folder tab: slightly darker -->
    <linearGradient id="tab" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a5b4fc"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
    <!-- Glow halo around status dot -->
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#22c55e" stop-opacity="0.9"/>
      <stop offset="40%" stop-color="#22c55e" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#22c55e" stop-opacity="0"/>
    </radialGradient>
    <!-- Soft outer glow -->
    <filter id="softglow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Rounded background -->
  <rect width="256" height="256" rx="56" fill="url(#bg)"/>

  <!-- Subtle inner border (rim light) -->
  <rect x="2" y="2" width="252" height="252" rx="54" fill="none"
        stroke="#1e2738" stroke-width="2"/>

  <!-- Folder tab (behind main body) -->
  <path d="M40 84 L40 64 Q40 56 48 56 L96 56 Q104 56 108 62 L116 76 L208 76 Q216 76 216 84 L216 96 L40 96 Z"
        fill="url(#tab)"/>

  <!-- Folder body (main rectangle) -->
  <path d="M40 96 L216 96 Q216 96 216 96 L216 196 Q216 204 208 204 L48 204 Q40 204 40 196 Z"
        fill="url(#folder)"/>

  <!-- Folder highlight (top edge) -->
  <path d="M48 100 L208 100" stroke="#a5b4fc" stroke-width="2" stroke-linecap="round" opacity="0.6"/>

  <!-- Status dot with glow (top-right) -->
  <circle cx="190" cy="68" r="40" fill="url(#glow)"/>
  <circle cx="190" cy="68" r="10" fill="#22c55e" filter="url(#softglow)"/>
  <circle cx="190" cy="68" r="6" fill="#dcfce7"/>

  <!-- Subtle "code" hint: two thin lines on the folder (representing content) -->
  <line x1="68" y1="140" x2="120" y2="140" stroke="#0b0f17" stroke-width="3" stroke-linecap="round" opacity="0.5"/>
  <line x1="68" y1="160" x2="160" y2="160" stroke="#0b0f17" stroke-width="3" stroke-linecap="round" opacity="0.5"/>
  <line x1="68" y1="180" x2="100" y2="180" stroke="#0b0f17" stroke-width="3" stroke-linecap="round" opacity="0.5"/>
</svg>
